# Supabase local project config.
# Run `supabase start` to boot the local stack, then `supabase db reset` to
# apply migrations + seed.sql. See app/README.md for the full local setup.

project_id = "visitor-data-management"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Local dev redirect target (the Vite dev server).
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Local dev convenience: no email confirmation step.
enable_confirmations = false

[functions.send-campaign]
verify_jwt = true

[functions.test-call-api]
verify_jwt = true

[functions.admin-users]
verify_jwt = true

[functions.whoami]
verify_jwt = true
